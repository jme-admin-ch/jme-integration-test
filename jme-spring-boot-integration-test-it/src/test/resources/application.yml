spring:
  application:
    name: jme-it
  main:
    banner-mode: off
  docker:
    compose:
      enabled: true
      file: ../docker/docker-compose.yml
      host: 172.18.0.1
      lifecycle-management: start-and-stop
      skip:
        in-tests: false
      arguments:
        - "--project-name=${COMPOSE_PROJECT_NAME:jme-it}"
      readiness:
        timeout: 60s

test:
  webserver:
    url: http://localhost:8181
