description:
  en:
    localisedName: jme-cdct-provider-example
    shortDescription: jEAP microservice example demonstrating consumer-driven contract testing with Pact in a provider.
    longDescription: >
      The jme-cdct-provider-example is a jEAP microservice example. It demonstrates consumer-driven contract testing
      with Pact in a provider. The example includes a test that retrieves all relevant pacts from a Pact Broker and
      verifies them against the provider implementation. This test checks if the provider meets all expectations
      defined by its consumers and reports the verification results back to the Pact Broker.
    features:
      - Run provider verification tests
      - Fetch pacts from a Pact Broker
      - Verify the provider implementation against the pacts
      - Publish verification results back to the Pact Broker
