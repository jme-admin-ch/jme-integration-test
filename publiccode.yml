description:
  en:
    localisedName: jme-integration-test
    shortDescription: jEAP microservice example integration test support library, providing a re-usable test harness for JME examples
    longDescription: >
      The jme-integration-test library provides base classes and utilities for writing integration tests that start
      and manage Spring Boot services via Maven. It is part of the jEAP ecosystem. When testing jEAP Microservice
      Examples, there is often the need to start one or more Spring Boot example apps, wait for them to become
      healthy, and then run assertions against their APIs. This library handles all the boilerplate: process
      lifecycle management, health check polling, Spring profile resolution, and OAuth2 token fetching.

      The library offers two base classes: BootServiceSpringIntegrationTestBase for tests that need a Spring
      application context, and BootServiceIntegrationTestBase for tests without one. Services are started via
      startService(moduleName, baseUrl), which launches the module using mvnw spring-boot:run and waits for its
      health endpoint to return 200. All started services including child processes are automatically destroyed
      after tests complete.

      The library also supports Spring Boot's Docker Compose integration. On CI, a docker-compose-ci.yml overlay
      resets port mappings and uses an external Docker network so that the test runner container and all compose
      services share the same network. The ci Spring profile is automatically activated when the CI environment
      variable is set, requiring no manual profile configuration on CI.
    features:
      - Service startup and lifecycle management via Maven spring-boot:run with health check polling
      - Automatic cleanup of all started services including child processes after tests complete
      - Spring profile resolution with automatic CI profile activation
      - OAuth2 access token fetching via client credentials flow
      - Awaitility defaults with 60-second timeout and 1-second polling interval
      - Docker Compose integration support with CI overlay for shared Docker networks
      - Base classes for tests with or without a Spring application context
